<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Isensix Calibration Dashboard</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <h1><i class="ti ti-activity-heartbeat"></i> Isensix Calibration</h1>
    <input id="server-input" type="text" placeholder="Server ID (e.g. 243)" style="width:165px;"/>
    <button class="primary" onclick="addServer()">Add server</button>
    <button onclick="loadData()"><i class="ti ti-refresh"></i> Refresh</button>
    <button onclick="toggleSettings()"><i class="ti ti-adjustments-horizontal"></i> Thresholds</button>
    <button onclick="toggleServerConfig()"><i class="ti ti-server-2"></i> Servers</button>
    <span id="status-msg"></span>
  </div>

  <!-- Server tags -->
  <div id="server-tags"></div>

  <!-- Thresholds settings panel -->
  <div id="settings-panel">
    <div class="settings-title">Failure thresholds — max absolute offset per sensor type</div>
    <div id="threshold-inputs"></div>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center;">
      <input id="new-type-name" type="text" placeholder="e.g. Temp-SC" style="width:110px;"/>
      <input id="new-type-val" type="number" placeholder="Max offset" step="0.01" style="width:110px;"/>
      <button onclick="addThreshold()">Add type</button>
    </div>
  </div>


  <div id="server-config-panel" style="display:none;" class="panel" style="padding:16px;">
  <div style="padding:16px;">
    <div class="settings-title">Server configuration</div>
    <div id="server-config-list"></div>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap;">
      <input id="sc-server" type="text" placeholder="Server ID (e.g. 005)" style="width:100px;"/>
      <select id="sc-version" style="width:90px;">
        <option value="G3.0">G3.0</option>
        <option value="G2.1">G2.1</option>
        <option value="G2.0">G2.0</option>
      </select>
      <input id="sc-hostname" type="text" placeholder="Hostname" style="width:220px;" value="ics1.ca.isensix.com"/>
      <input id="sc-notes" type="text" placeholder="Notes (optional)" style="width:150px;"/>
      <button onclick="saveServerConfig()">Save</button>
    </div>
  </div>
</div>


<!-- NOT LETTING USERS CHANGE TYPE COLORS FOR NOW
  <div style="border-top:0.5px solid var(--border);margin-top:16px;padding-top:16px;">
    <div class="settings-title">Type badge colors</div>
    <div id="color-inputs"></div>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center;">
      <input id="new-color-type" type="text" placeholder="e.g. Temp-SC" style="width:110px;"/>
      <input id="new-color-bg" type="color" value="#1e1e28" style="width:44px;height:28px;padding:2px;"/>
      <input id="new-color-fg" type="color" value="#888899" style="width:44px;height:28px;padding:2px;"/>
    <button onclick="addTypeColor()">Add type</button>
  </div>
</div>-->

  <!-- Metrics -->
  <div id="metrics"></div>

  <!-- Tab bar -->
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="left">Sensors left</button>
    <button class="tab-btn" data-tab="calibrated">Calibrated</button>
    <button class="tab-btn" data-tab="failures">Failures</button>
    <button class="tab-btn" data-tab="types">By type</button>
    <button class="tab-btn" data-tab="zones">By zone</button>
    <button class="tab-btn" data-tab="all">All sensors</button>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);cursor:pointer;">
    <input type="checkbox" id="show-disabled" onchange="renderTable()" style="cursor:pointer;"/>
    Show disabled
    </label>
  </div>

  <!-- Filter bar -->
  <div id="filter-bar">
    <select id="type-filter" onchange="renderTable()"><option value="">All types</option></select>
    <select id="server-filter" onchange="renderTable()"><option value="">All servers</option></select>
    <input id="search-input" type="text" placeholder="Search name, zone, CP addr, AP…"
           style="width:220px;" oninput="renderTable()"/>
  </div>

  <!-- Main panel -->
  <div id="main-panel" class="panel">
    <div class="panel-hdr">
      <span class="panel-title" id="panel-title">Sensors left</span>
      <span class="panel-count" id="panel-count"></span>
    </div>
    <div id="table-area"></div>
  </div>

  <!-- Empty state -->
  <div id="empty-state">
    <i class="ti ti-database-off"></i>
    Add server IDs above and click Refresh to load data.
  </div>

</div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
